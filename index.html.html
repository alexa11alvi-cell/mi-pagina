<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Alexa</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#f5e6e1,#ffffff);
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:linear-gradient(90deg,#c8a79d,#793A2A);
    color:white;
}

.logo{
    font-size:28px;
    font-family:Arial;
    font-weight:bold;
}

.menu{
    display:flex;
    gap:20px;
}

.menu a{
    color:white;
    cursor:pointer;
}

/* BOTONES */
button{cursor:pointer;}

.buttons button{
    margin-left:10px;
    padding:8px 15px;
    border-radius:20px;
    border:none;
}

.reg{background:transparent;border:1px solid white;color:white;}
.login{background:white;color:#793A2A;}

.btn{background:#793A2A;color:white;padding:10px;border:none;border-radius:8px;}

.add{background:#793A2A;color:white;padding:10px;border:none;border-radius:8px;margin:5px;}
.back{background:#c8a79d;padding:10px;border:none;border-radius:8px;}

/* MODAL */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.4);
}

.modal-content{
    position:relative;
    background:white;
    padding:25px;
    border-radius:15px;
    width:350px;
    text-align:center;
}

.close{
    position:absolute;
    top:15px;
    right:20px;
    cursor:pointer;
}

/* INPUT */
input,select{
    width:90%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

/* PANTALLAS */
.pantalla{display:none;}

.container{
    width:90%;
    margin:auto;
    margin-top:20px;
    background:white;
    padding:20px;
    border-radius:15px;
}

/* TABLA */
table{width:100%;border-collapse:collapse;}
th{background:#793A2A;color:white;}
th,td{padding:10px;text-align:center;}

/* CARDS */
.card{
    background:#f5e6e1;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

/* SEMANA */
.semana{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}
.dia{
    border:1px solid #999;
    border-radius:10px;
    padding:10px;
    min-height:100px;
}

/* NOTAS */
.notas{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}
.nota{
    background:#fff8dc;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">ALEXA</div>

    <div class="menu">
        <a onclick="abrirDisenos()">Diseños</a>
        <a onclick="abrirPlanes()">Planes</a>
        <a onclick="mostrarAgenda()">Agendas</a>
        <a onclick="abrirVentas()">Ventas</a>
    </div>

    <div class="buttons">
        <button class="reg" onclick="abrirRegistro()">Registrarte</button>
        <button class="login" onclick="abrirLogin()">Iniciar sesión</button>
    </div>
</div>

<!-- MODALES -->
<div class="modal" id="modalRegistro">
    <div class="modal-content">
        <span class="close" onclick="cerrar()">✖</span>
        <h2>Crear Cuenta</h2>
        <input id="regEmail" placeholder="Correo">
        <input id="regPass" type="password" placeholder="Contraseña">
        <button class="btn" onclick="registrar()">Registrarse</button>
    </div>
</div>

<div class="modal" id="modalLogin">
    <div class="modal-content">
        <span class="close" onclick="cerrar()">✖</span>
        <h2>Iniciar Sesión</h2>
        <input id="loginEmail" placeholder="Correo">
        <input id="loginPass" type="password" placeholder="Contraseña">
        <button class="btn" onclick="login()">Entrar</button>
        <button class="btn" onclick="loginDemo()">Google</button>
    </div>
</div>

<!-- AGENDA -->
<div id="agenda" class="pantalla">
<div class="container">
<h2>📅 Citas Semanales</h2>
<div class="semana" id="semana"></div>
<button class="add" onclick="agregarCita()">+ Agregar Cita</button>

<h2>📝 Notas</h2>
<button class="add" onclick="agregarNota()">+ Nota</button>
<div class="notas" id="notas"></div>
</div>
</div>

<!-- VENTAS -->
<div id="ventas" class="pantalla">
<div class="container">
<h2>💰 Ventas</h2>
<button class="add" onclick="agregarVenta()">+ Venta</button>
<table>
<thead><tr><th>Producto</th><th>Precio</th><th>Acciones</th></tr></thead>
<tbody id="tablaVentas"></tbody>
</table>
</div>
</div>

<!-- DISEÑOS -->
<div id="disenos" class="pantalla">
<div class="container">
<h2>🎨 Diseños</h2>
<input id="textoDiseno" placeholder="Texto">
<select id="fuente">
<option value="serif">Elegante</option>
<option value="cursive">Manuscrita</option>
<option value="monospace">Formal</option>
</select>
<input id="tamano" type="number" placeholder="Tamaño">
<button class="add" onclick="aplicarDiseno()">Aplicar</button>
<button class="add" onclick="guardarDiseno()">Guardar</button>

<div class="card"><h3 id="textoPreview">Vista previa</h3></div>

<h3>📂 Guardados</h3>
<div id="listaDisenos"></div>
</div>
</div>

<!-- PLANES -->
<div id="planes" class="pantalla">
<div class="container">
<h2>💡 Planes</h2>

<div class="card">👗 Ropa <button onclick="usarPlan('Ropa')">Usar</button></div>
<div class="card">☕ Cafetería <button onclick="usarPlan('Cafetería')">Usar</button></div>
<div class="card">💻 Apps <button onclick="usarPlan('Apps')">Usar</button></div>
<div class="card">📦 Tienda Online <button onclick="usarPlan('Tienda Online')">Usar</button></div>
<div class="card">💄 Cosméticos <button onclick="usarPlan('Cosméticos')">Usar</button></div>
<div class="card">🍔 Comida Rápida <button onclick="usarPlan('Comida Rápida')">Usar</button></div>
<div class="card">🎓 Cursos Online <button onclick="usarPlan('Cursos Online')">Usar</button></div>

<h3>📌 Seleccionados</h3>
<div id="listaPlanes"></div>
</div>
</div>

<script>
let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
let disenos = JSON.parse(localStorage.getItem("disenos")) || [];
let planes = JSON.parse(localStorage.getItem("planes")) || [];
let citas = JSON.parse(localStorage.getItem("citas")) || {};
let notas = JSON.parse(localStorage.getItem("notas")) || [];
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

/* MODALES */
function abrirRegistro(){document.getElementById("modalRegistro").style.display="flex";}
function abrirLogin(){document.getElementById("modalLogin").style.display="flex";}
function cerrar(){
document.getElementById("modalRegistro").style.display="none";
document.getElementById("modalLogin").style.display="none";
}

/* ===== REGISTRO ===== */
function registrar(){
let email=document.getElementById("regEmail").value;
let pass=document.getElementById("regPass").value;

if(!email||!pass){alert("Completa datos");return;}

let existe=usuarios.find(u=>u.email===email);
if(existe){alert("Usuario ya existe");return;}

usuarios.push({email,pass});
localStorage.setItem("usuarios",JSON.stringify(usuarios));

alert("Cuenta creada");
cerrar();
}

/* ===== LOGIN ===== */
function login(){
let email=document.getElementById("loginEmail").value;
let pass=document.getElementById("loginPass").value;

let user=usuarios.find(u=>u.email===email && u.pass===pass);

if(user){
alert("Bienvenida "+email);
cerrar();
mostrarAgenda();
}else{
alert("Datos incorrectos");
}
}

/* GOOGLE DEMO */
function loginDemo(){
alert("Inicio con Google (demo)");
cerrar();
mostrarAgenda();
}

/* NAV */
function ocultarTodo(){
document.querySelectorAll(".pantalla").forEach(p=>p.style.display="none");
}
function mostrarAgenda(){ocultarTodo();agenda.style.display="block";renderSemana();renderNotas();}
function abrirVentas(){ocultarTodo();ventas.style.display="block";mostrarVentas();}
function abrirDisenos(){ocultarTodo();disenosDiv=document.getElementById("disenos");disenosDiv.style.display="block";mostrarDisenos();}
function abrirPlanes(){ocultarTodo();planesDiv=document.getElementById("planes");planesDiv.style.display="block";mostrarPlanes();}

/* CITAS */
const dias=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
function renderSemana(){
let cont=document.getElementById("semana");
cont.innerHTML="";
dias.forEach(d=>{
cont.innerHTML+=`<div class="dia" onclick="editarDia('${d}')"><b>${d}</b><br>${citas[d]||""}</div>`;
});
}
function agregarCita(){
let d=prompt("Día");let t=prompt("Cita");
if(d&&t){citas[d]=t;localStorage.setItem("citas",JSON.stringify(citas));renderSemana();}
}
function editarDia(d){
let n=prompt("Editar",citas[d]||"");
if(n!==null){citas[d]=n;localStorage.setItem("citas",JSON.stringify(citas));renderSemana();}
}

/* NOTAS */
function agregarNota(){
let n=prompt("Nota");
if(n){notas.push(n);localStorage.setItem("notas",JSON.stringify(notas));renderNotas();}
}
function renderNotas(){
let c=document.getElementById("notas");c.innerHTML="";
notas.forEach(n=>c.innerHTML+=`<div class="nota">${n}</div>`);
}

/* VENTAS */
function agregarVenta(){
let p=prompt("Producto");let precio=prompt("Precio");
if(p&&precio){ventas.push({p,precio});localStorage.setItem("ventas",JSON.stringify(ventas));mostrarVentas();}
}
function mostrarVentas(){
let t=document.getElementById("tablaVentas");t.innerHTML="";
ventas.forEach((v,i)=>{
t.innerHTML+=`<tr><td>${v.p}</td><td>${v.precio}</td>
<td><button onclick="editarVenta(${i})">✏</button>
<button onclick="eliminarVenta(${i})">🗑</button></td></tr>`;
});
}
function editarVenta(i){
let p=prompt("Producto",ventas[i].p);
let precio=prompt("Precio",ventas[i].precio);
ventas[i]={p,precio};
localStorage.setItem("ventas",JSON.stringify(ventas));
mostrarVentas();
}
function eliminarVenta(i){
ventas.splice(i,1);
localStorage.setItem("ventas",JSON.stringify(ventas));
mostrarVentas();
}

/* DISEÑOS */
function aplicarDiseno(){
let p=document.getElementById("textoPreview");
p.innerText=document.getElementById("textoDiseno").value;
p.style.fontFamily=document.getElementById("fuente").value;
p.style.fontSize=document.getElementById("tamano").value+"px";
}
function guardarDiseno(){
disenos.push(document.getElementById("textoPreview").innerText);
localStorage.setItem("disenos",JSON.stringify(disenos));
mostrarDisenos();
}
function mostrarDisenos(){
let lista=document.getElementById("listaDisenos");
lista.innerHTML="";
disenos.forEach((d,i)=>{
lista.innerHTML+=`
<div class="card">
${d}
<br><br>
<button onclick="eliminarDiseno(${i})">🗑 Borrar</button>
</div>`;
});
}
function eliminarDiseno(i){
disenos.splice(i,1);
localStorage.setItem("disenos",JSON.stringify(disenos));
mostrarDisenos();
}

/* PLANES */
function usarPlan(p){
planes.push(p);
localStorage.setItem("planes",JSON.stringify(planes));
mostrarPlanes();
}
function mostrarPlanes(){
let lista=document.getElementById("listaPlanes");
lista.innerHTML="";
planes.forEach((p,i)=>{
lista.innerHTML+=`
<div class="card">
${p}
<br><br>
<button onclick="eliminarPlan(${i})">🗑 Borrar</button>
</div>`;
});
}
function eliminarPlan(i){
planes.splice(i,1);
localStorage.setItem("planes",JSON.stringify(planes));
mostrarPlanes();
}
</script>

</body>
</html>
